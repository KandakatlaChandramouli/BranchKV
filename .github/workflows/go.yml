name: branchkv-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: test
      run: go test ./...

    - name: benchmark
      run: go test -bench=. ./benchmarks
